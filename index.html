<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyVeg - Awurudu Rasakewili</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #fffcf2; -webkit-tap-highlight-color: transparent; }
        .festive-gradient { background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #fbbf24; color: #b91c1c; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; border: 1px solid white; }
        .active-tab { background-color: #b91c1c !important; color: white !important; border-color: #b91c1c !important; }
        .product-card { transition: all 0.2s ease; }
        .product-card:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white shadow-sm p-3 md:p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 md:space-x-3">
                <img src="https://i.ibb.co/Lhyg68F/logo.jpg" alt="EasyVeg Logo" class="h-10 w-10 md:h-12 md:w-12 rounded-full border-2 border-green-600">
                <div>
                    <h1 class="text-lg md:text-2xl font-black text-green-700 leading-none">EasyVeg</h1>
                    <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase tracking-widest">Digital Sweets Shop</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="showAdminLogin()" class="text-gray-300 hover:text-gray-500 transition"><i class="fas fa-lock text-lg"></i></button>
                <button onclick="toggleCart()" class="relative p-2.5 text-red-700 bg-red-50 rounded-full active:bg-red-100 transition shadow-sm">
                    <i class="fas fa-shopping-basket text-xl md:text-2xl"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <div id="admin-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-md shadow-2xl">
            <div id="login-form">
                <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
                <input type="email" id="admin-email" placeholder="Email" class="w-full p-4 bg-gray-50 border rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-green-500">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="loginAdmin()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Enter Portal</button>
                <button onclick="closeAdmin()" class="w-full mt-4 text-gray-400 text-sm">Cancel</button>
            </div>
            <div id="upload-panel" class="hidden">
                <h2 class="text-xl font-bold mb-4 text-green-700">Update Products</h2>
                <div class="space-y-4">
                    <select id="prod-id" class="w-full p-4 bg-gray-50 border rounded-2xl font-semibold">
                        <optgroup label="Individual Items">
                            <option value="1">Konda Keum</option><option value="2">Mung Keum</option>
                            <option value="3">Kokis</option><option value="4">Aluwa</option>
                            <option value="5">Rulang</option><option value="6">Naran Keum</option>
                            <option value="7">Pani Walalu</option><option value="8">Aasmi</option>
                            <option value="9">Dodol - 250g</option>
                        </optgroup>
                        <optgroup label="Special Packs">
                            <option value="101">Pack 1</option><option value="102">Pack 2</option>
                            <option value="103">Pack 3</option><option value="104">Pack 4</option>
                            <option value="105">Pack 5</option><option value="106">Pack 6</option>
                            <option value="107">Pack 7</option>
                        </optgroup>
                    </select>
                    <input type="number" id="prod-price" placeholder="Enter New Price" class="w-full p-4 bg-gray-50 border rounded-2xl">
                    <div class="p-4 border-2 border-dashed rounded-2xl text-center bg-blue-50">
                        <input type="file" id="file-input" class="w-full text-xs">
                    </div>
                    <button id="up-btn" onclick="uploadToImgBB()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-md">Sync Data</button>
                    <button onclick="initializeDB()" class="w-full bg-orange-100 text-orange-700 py-2 rounded-xl text-[10px] font-bold uppercase mt-4">Manual Data Repair</button>
                    <p id="up-status" class="mt-2 text-xs text-center font-bold"></p>
                    <button onclick="closeAdmin()" class="w-full mt-4 text-red-500 font-bold">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <section class="festive-gradient text-white p-8 md:p-14 text-center">
        <h2 class="text-4xl md:text-6xl font-black mb-2 tracking-tight">අවුරුදු රසකැවිලි</h2>
        <p class="text-yellow-200 text-sm md:text-xl italic font-light">Authentic & Fresh Sri Lankan Treats</p>
    </section>

    <div class="flex justify-center space-x-2 mt-8 px-4">
        <button onclick="filterItems('all')" id="btn-all" class="filter-btn active-tab px-6 py-2.5 rounded-full border border-gray-200 text-xs font-black uppercase transition shadow-sm">All</button>
        <button onclick="filterItems('item')" id="btn-item" class="filter-btn bg-white px-6 py-2.5 rounded-full border border-gray-200 text-gray-500 text-xs font-black uppercase transition shadow-sm">Individual</button>
        <button onclick="filterItems('pack')" id="btn-pack" class="filter-btn bg-white px-6 py-2.5 rounded-full border border-gray-200 text-gray-500 text-xs font-black uppercase transition shadow-sm">Packs</button>
    </div>

    <main class="container mx-auto px-4 mt-8">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <div class="col-span-full text-center py-20 text-gray-400 animate-pulse">
                <i class="fas fa-cookie-bite text-4xl mb-4"></i>
                <p>Connecting to EasyVeg Database...</p>
            </div>
        </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 ease-in-out">
        <div class="flex flex-col h-full">
            <div class="p-6 border-b flex justify-between items-center bg-red-700 text-white shadow-md">
                <h3 class="text-xl font-bold uppercase tracking-widest">ඔබේ ඇණවුම</h3>
                <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
            <div class="p-6 border-t bg-white shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between text-2xl font-black mb-6 text-gray-800">
                    <span>එකතුව (Total):</span>
                    <span class="text-red-700">Rs. <span id="cart-total">0</span></span>
                </div>
                <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center space-x-3 shadow-xl active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-3xl"></i>
                    <span>Order via WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCeo_DytuLnAin7WnzcKcOQQO9DgGcR7pA",
            authDomain: "my-web-site-5cbf9.firebaseapp.com",
            projectId: "my-web-site-5cbf9",
            databaseURL: "https://my-web-site-5cbf9-default-rtdb.asia-southeast1.firebasedatabase.app", 
            storageBucket: "my-web-site-5cbf9.firebasestorage.app",
            messagingSenderId: "713144193429",
            appId: "1:713144193429:web:33cbdc57268184af79a69c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_API = "0d3d35934a71f8813b2b79e4b464eea5";
        const WHATSAPP = "94716086853";

        let db_items = {};
        let db_packs = {};
        let products = [];
        let cart = [];

        // AUDIT FIX: Independent Listeners for robust loading
        function loadData() {
            // Listener 1: Items
            db.ref('products').on('value', (snap) => {
                db_items = snap.val() || {};
                mergeAndRender();
            });
            // Listener 2: Packs
            db.ref('packs').on('value', (snap) => {
                db_packs = snap.val() || {};
                mergeAndRender();
            });
        }

        function mergeAndRender() {
            const combined = [
                ...Object.keys(db_items).map(id => ({id, ...db_items[id], category: 'item'})),
                ...Object.keys(db_packs).map(id => ({id, ...db_packs[id], category: 'pack'}))
            ];
            products = combined;
            renderUI(currentTab);
        }

        let currentTab = 'all';
        function renderUI(filter = 'all') {
            currentTab = filter;
            const grid = document.getElementById('product-grid');
            
            // AUDIT FIX: Self-healing category logic
            let filtered = products;
            if(filter === 'item') filtered = products.filter(p => p.category === 'item' || parseInt(p.id) < 100);
            if(filter === 'pack') filtered = products.filter(p => p.category === 'pack' || parseInt(p.id) >= 100);

            if(products.length === 0) return;

            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-white rounded-[2rem] shadow-sm border border-gray-100 p-2.5 flex flex-col hover:shadow-xl transition-all">
                    <div class="w-full h-32 md:h-48 bg-gray-100 rounded-[1.5rem] mb-3 overflow-hidden">
                        <img src="${p.img || 'https://via.placeholder.com/400x400?text=EasyVeg'}" class="w-full h-full object-cover">
                    </div>
                    <div class="px-1 flex-grow">
                        <h3 class="font-bold text-gray-800 text-[11px] md:text-sm mb-1 uppercase tracking-tight line-clamp-1">${p.name}</h3>
                        ${p.details ? `<p class="text-[9px] text-gray-400 italic mb-2 line-clamp-2 leading-none">${p.details}</p>` : ''}
                        <p class="text-red-700 font-black text-sm md:text-xl mb-3">Rs. ${p.price}</p>
                    </div>
                    <button onclick="addToCart('${p.id}')" class="mt-auto bg-yellow-400 text-red-900 text-[10px] font-black py-3 rounded-2xl uppercase tracking-widest active:bg-yellow-500 shadow-sm">Add to Basket</button>
                </div>
            `).join('');
        }

        function filterItems(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-tab', 'bg-white', 'text-gray-500'));
            document.getElementById('btn-' + type).classList.add('active-tab');
            renderUI(type);
        }

        // CART LOGIC
        function addToCart(id) {
            const p = products.find(x => x.id == id);
            const exist = cart.find(x => x.id == id);
            if(exist) exist.qty++; 
            else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            let total = 0;

            list.innerHTML = cart.map((item, i) => {
                const sub = item.price * item.qty;
                total += sub;
                return `
                    <div class="flex items-center justify-between bg-white p-4 rounded-3xl border border-gray-100 shadow-sm">
                        <div class="flex items-center space-x-3">
                            <img src="${item.img}" class="w-14 h-14 rounded-2xl object-cover bg-gray-50">
                            <div>
                                <h4 class="font-bold text-[10px] uppercase text-gray-800 leading-none mb-1">${item.name}</h4>
                                <p class="text-red-700 font-bold text-sm">Rs. ${item.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 bg-gray-50 p-1 rounded-full border">
                            <button onclick="changeQty(${i}, -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm">-</button>
                            <span class="font-black text-sm w-6 text-center">${item.qty}</span>
                            <button onclick="changeQty(${i}, 1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm">+</button>
                        </div>
                    </div>`;
            }).join('');
            
            if(cart.length === 0) list.innerHTML = `<div class="text-center py-20 text-gray-300 uppercase text-[10px] font-bold tracking-widest">Basket is Empty</div>`;

            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            totalDisplay.innerText = total.toLocaleString();
        }

        function changeQty(idx, d) { cart[idx].qty += d; if(cart[idx].qty <= 0) cart.splice(idx, 1); updateCartUI(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        // ADMIN
        function showAdminLogin() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        
        function loginAdmin() {
            if(document.getElementById('admin-email').value === "gayal@gmail.com" && document.getElementById('admin-pass').value === "abc@123") {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('upload-panel').classList.remove('hidden');
            } else { alert("Access Denied!"); }
        }

        async function uploadToImgBB() {
            const file = document.getElementById('file-input').files[0];
            const id = document.getElementById('prod-id').value;
            const price = document.getElementById('prod-price').value;
            const status = document.getElementById('up-status');
            const btn = document.getElementById('up-btn');

            if(!file && !price) return alert("Photo or Price required!");
            btn.disabled = true; status.innerText = "Syncing... ⚡";

            try {
                let finalImgUrl = products.find(p => p.id == id)?.img || "";

                if(file) {
                    const form = new FormData(); form.append("image", file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: "POST", body: form });
                    const data = await res.json();
                    finalImgUrl = data.data.url;
                }

                const path = parseInt(id) > 100 ? 'packs/' : 'products/';
                const updateData = { img: finalImgUrl };
                if(price) updateData.price = parseInt(price);

                await db.ref(path + id).update(updateData);
                status.innerText = "Database Updated! ✅";
                status.style.color = "green";
            } catch (e) {
                status.innerText = "Error: " + e.message;
                status.style.color = "red";
            } finally { btn.disabled = false; }
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return alert("Basket is empty!");
            let msg = "*EASY VEG - NEW ORDER*\n";
            msg += "------------------------------\n";
            let total = 0;
            cart.forEach(i => {
                msg += `✅ *${i.name}* (x${i.qty}) = Rs.${i.qty * i.price}\n`;
                total += (i.qty * i.price);
            });
            msg += `\n*GRAND TOTAL: Rs.${total.toLocaleString()}*\n------------------------------\nName:\nAddress:`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function initializeDB() {
            const pD = {
                1: { name: "Konda Keum", price: 110, img: "", category: "item" },
                2: { name: "Mung Keum", price: 100, img: "", category: "item" },
                3: { name: "Kokis", price: 60, img: "", category: "item" },
                4: { name: "Aluwa", price: 90, img: "", category: "item" },
                5: { name: "Rulang", price: 90, img: "", category: "item" },
                6: { name: "Naran Keum", price: 100, img: "", category: "item" },
                7: { name: "Pani Walalu", price: 130, img: "", category: "item" },
                8: { name: "Aasmi", price: 170, img: "", category: "item" },
                9: { name: "Dodol - 250g", price: 550, img: "", category: "item" }
            };
            const pkD = {
                101: { name: "Pack 1", price: 900, details: "Konda Keum 2, Mung Keum 2, Kokis 5, Aluwa 2", img: "", category: "pack" },
                102: { name: "Pack 2", price: 1500, details: "Konda Keum 3, Mung Keum 3, Kokis 7, Pani Walalu 2, Aasmi 1", img: "", category: "pack" },
                103: { name: "Pack 3", price: 2000, details: "Konda Keum 5, Mung Keum 5, Kokis 8, Aluwa 2, Pani Walalu 1, Aasmi 1", img: "", category: "pack" },
                104: { name: "Pack 4", price: 2500, details: "Konda Keum 5, Mung Keum 5, Kokis 10, Aluwa 2, Rulang 2, Pani Walalu 2, Aasmi 1", img: "", category: "pack" },
                105: { name: "Pack 5", price: 3500, details: "Konda Keum 5, Mung Keum 5, Kokis 10, Aluwa 3, Rulang 3, Naran Keum 2, Pani Walalu 2, Aasmi 2, Dodol 1", img: "", category: "pack" },
                106: { name: "Pack 6", price: 5000, details: "Konda Keum 8, Mung Keum 8, Kokis 12, Aluwa 4, Rulang 5, Naran Keum 4, Pani Walalu 4, Aasmi 2, Dodol 1", img: "", category: "pack" },
                107: { name: "Pack 7", price: 7500, details: "Konda Keum 10, Mung Keum 10, Kokis 20, Aluwa 7, Rulang 6, Naran Keum 5, Pani Walalu 6, Aasmi 4, Dodol 2", img: "", category: "pack" }
            };
            db.ref('products').set(pD);
            db.ref('packs').set(pkD);
            alert("Database Corrected!");
        }

        loadData();
    </script>
</body>
</html>
